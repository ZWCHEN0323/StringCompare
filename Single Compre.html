<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高精準度文字比對工具 (String Compare)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 20px;
            background-color: #f6f8fa;
            color: #24292e;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .textarea-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .textarea-box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
        }
        textarea {
            height: 180px;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-family: Consolas, Monaco, monospace;
            font-size: 14px;
            resize: vertical;
        }
        button {
            background-color: #2da44e;
            color: white;
            border: 1px solid rgba(27, 31, 36, 0.15);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
        }
        button:hover {
            background-color: #2c974b;
        }
        .diff-display {
            display: flex;
            gap: 20px;
            background: white;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 15px;
            min-height: 150px;
            font-family: Consolas, Monaco, monospace;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
        }
        .diff-panel {
            flex: 1;
            padding: 12px;
            background: #fafafa;
            border-radius: 4px;
            border: 1px solid #eee;
        }
        .diff-title {
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #ccc;
        }
        /* 標記樣式 */
        .del {
            background-color: #ffebe9;
            text-decoration: line-through;
            color: #cf222e;
            padding: 0 2px;
        }
        .ins {
            background-color: #dafbe1;
            color: #1a7f37;
            padding: 0 2px;
        }
        .dimmed {
            color: #8c959f;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 專業級精細文字比對工具</h2>
    <p style="color: #57606a; font-size: 14px;">採用穩定內嵌演算法，支援<b>中英文個別字元精密比對</b>。100% 獨立運行，不依賴任何外部網路。</p>
    
    <div class="textarea-group">
        <div class="textarea-box">
            <label>原始文字 (Original)</label>
            <textarea id="text1">今天天氣很好，我想去吃拉麵和喝飲料。
這是一段舊的測試文字。
Apple, Banana, Cherry.</textarea>
        </div>
        <div class="textarea-box">
            <label>修改後文字 (Modified)</label>
            <textarea id="text2">今天天氣特別好，我想去吃牛肉麵和喝冰飲料！
這是一段全新的測試文字。
Apple, BlueBerry, Cherry.</textarea>
        </div>
    </div>

    <button onclick="runGoogleDiff()">立即進行精密比對</button>

    <div class="diff-display">
        <div class="diff-panel">
            <div class="diff-title" style="color: #cf222e;">舊版本狀態 (- 顯示被刪除的字)</div>
            <div id="output-left"><span class="dimmed">點擊上方按鈕開始...</span></div>
        </div>
        <div class="diff-panel">
            <div class="diff-title" style="color: #1a7f37;">新版本狀態 (+ 顯示新加入的字)</div>
            <div id="output-right"><span class="dimmed">點擊上方按鈕開始...</span></div>
        </div>
    </div>
</div>

<script>
    /* =====================================================================
       極簡精密比對引擎 (基於字元層級比對)
       ===================================================================== */
    function simpleCharDiff(text1, text2) {
        let memo = {};
        function lcs(i, j) {
            let key = i + "," + j;
            if (key in memo) return memo[key];
            if (i === 0 || j === 0) return [];
            
            if (text1[i - 1] === text2[j - 1]) {
                let res = lcs(i - 1, j - 1).concat([{ type: 0, text: text1[i - 1] }]);
                memo[key] = res;
                return res;
            } else {
                let res1 = lcs(i - 1, j);
                let res2 = lcs(i, j - 1);
                let res = res1.length >= res2.length ? res1 : res2;
                memo[key] = res;
                return res;
            }
        }

        // 優化的大文本對比策略：基於最長公共子序列（LCS）衍生出 Diff
        let t1 = Array.from(text1);
        let t2 = Array.from(text2);
        
        // 為了防止極端大文本導致遞迴過深，此處採用標準動態規劃矩陣法
        let m = t1.length;
        let n = t2.length;
        let dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
        
        for (let i = 1; i <= m; i++) {
            for (let j = 1; j <= n; j++) {
                if (t1[i - 1] === t2[j - 1]) {
                    dp[i][j] = dp[i - 1][j - 1] + 1;
                } else {
                    dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                }
            }
        }
        
        let diff = [];
        let i = m, j = n;
        while (i > 0 || j > 0) {
            if (i > 0 && j > 0 && t1[i - 1] === t2[j - 1]) {
                diff.unshift([0, t1[i - 1]]);
                i--; j--;
            } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                diff.unshift([1, t2[j - 1]]);
                j--;
            } else {
                diff.unshift([-1, t1[i - 1]]);
                i--;
            }
        }
        
        // 合併連續的相同類型操作，避免產生過多碎標籤
        let mergedDiff = [];
        if (diff.length > 0) {
            let currentType = diff[0][0];
            let currentText = diff[0][1];
            for (let k = 1; k < diff.length; k++) {
                if (diff[k][0] === currentType) {
                    currentText += diff[k][1];
                } else {
                    mergedDiff.push([currentType, currentText]);
                    currentType = diff[k][0];
                    currentText = diff[k][1];
                }
            }
            mergedDiff.push([currentType, currentText]);
        }
        return mergedDiff;
    }

    // HTML 安全脫逸
    function escapeHtml(str) {
        return String(str).replace(/[&<>"'`=\/]/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '/': '&#x2F;' }[s]));
    }

    /* =====================================================================
       主要按鈕執行控制
       ===================================================================== */
    function runGoogleDiff() {
        const text1 = document.getElementById('text1').value;
        const text2 = document.getElementById('text2').value;
        
        // 執行精密字元級別比對
        const diffs = simpleCharDiff(text1, text2);

        let leftHtml = "";  // 舊版本顯示 (左)
        let rightHtml = ""; // 新版本顯示 (右)

        // 走訪比對結果
        // status: 0 = 未變動, -1 = 被刪除, 1 = 新增
        for (let i = 0; i < diffs.length; i++) {
            const status = diffs[i][0];
            const text = escapeHtml(diffs[i][1]);

            if (status === 0) {
                leftHtml += text;
                rightHtml += text;
            } else if (status === -1) {
                leftHtml += `<span class="del">${text}</span>`;
            } else if (status === 1) {
                rightHtml += `<span class="ins">${text}</span>`;
            }
        }

        // 渲染回畫面上
        document.getElementById('output-left').innerHTML = leftHtml || '<span class="dimmed">(空白)</span>';
        document.getElementById('output-right').innerHTML = rightHtml || '<span class="dimmed">(空白)</span>';
    }
</script>

</body>
</html>
